  <rect width="680" height="310" fill="#f9f9f9" rx="8"/>
  <text x="340" y="20" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Block Diffusion：块间 AR，块内扩散</text>

  <!-- ── Row 1: block overview ── -->
  <!-- Block 1 done -->
  <rect x="20" y="35" width="118" height="42" fill="#c8f0c8" stroke="#5a5" rx="4"/>

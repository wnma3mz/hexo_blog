  <rect x="92"  y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="132" y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="172" y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="212" y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="252" y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="292" y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="332" y="229" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>

  <text x="79" y="66" text-anchor="middle" fill="#555">jumps over the lazy</text>

  <!-- AR arrow -->
  <line x1="140" y1="56" x2="160" y2="56" stroke="#5a5" stroke-width="1.5" marker-end="url(#a2g)"/>

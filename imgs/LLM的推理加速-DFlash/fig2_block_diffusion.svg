  <rect x="92"  y="211" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="132" y="211" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>
  <rect x="172" y="211" width="38" height="14" fill="#c8f0c8" stroke="#5a5" rx="1"/>

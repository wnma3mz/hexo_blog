  <!-- carry-over note (two lines) -->
  <text x="340" y="266" text-anchor="middle" fill="#888" font-size="10">解锁后不再重新 Mask（Carry-Over Unmasking）：</text>
  <text x="340" y="280" text-anchor="middle" fill="#888" font-size="10">已定下的 token 保持稳定，作为后续 block 的可靠上下文。</text>

<svg width="660" height="330" viewBox="0 0 660 330" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: monospace; font-size: 11px; }</style>
  <defs>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="a4b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#4a90d9"/>
    </marker>
  </defs>
  <rect width="660" height="330" fill="#f9f9f9" rx="8"/>
  <text x="330" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">DFlash 架构：Target Model 特征注入 Draft Model 各层</text>

  <!-- ── Left: Target Model ── -->
  <text x="120" y="46" text-anchor="middle" fill="#333" font-weight="bold" font-size="12">Target Model</text>

  <rect x="30" y="56" width="180" height="26" fill="#fde8d8" stroke="#d07" rx="4"/>
  <text x="120" y="73" text-anchor="middle" fill="#500">Layer 2  →  h₁</text>

  <line x1="120" y1="82" x2="120" y2="90" stroke="#aaa" stroke-width="1" marker-end="url(#a4)"/>

  <rect x="30" y="94" width="180" height="26" fill="#fde8d8" stroke="#d07" rx="4"/>
  <text x="120" y="111" text-anchor="middle" fill="#500">Layer L/3  →  h₂</text>

  <line x1="120" y1="120" x2="120" y2="128" stroke="#aaa" stroke-width="1" marker-end="url(#a4)"/>

  <rect x="30" y="132" width="180" height="26" fill="#fde8d8" stroke="#d07" rx="4"/>
  <text x="120" y="149" text-anchor="middle" fill="#500">Layer 2L/3  →  h₃</text>

  <line x1="120" y1="158" x2="120" y2="166" stroke="#aaa" stroke-width="1" marker-end="url(#a4)"/>

  <rect x="30" y="170" width="180" height="26" fill="#fde8d8" stroke="#d07" rx="4"/>
  <text x="120" y="187" text-anchor="middle" fill="#500">Layer L-2  →  h₄</text>

  <!-- Fusion box: wider to fit text -->
  <rect x="30" y="212" width="180" height="26" fill="#fff3cd" stroke="#f0a500" rx="4"/>
  <text x="120" y="229" text-anchor="middle" fill="#600">[h₁‖h₂‖h₃‖h₄] → Proj → g</text>

  <!-- ── Middle: injection label (above arrows, not overlapping) ── -->
  <text x="290" y="200" text-anchor="middle" fill="#4a90d9" font-size="10" font-weight="bold">注入各层 KV Cache</text>

  <!-- Arrows from fusion box right edge to each draft layer -->
  <line x1="212" y1="225" x2="318" y2="150" stroke="#4a90d9" stroke-width="1.4" marker-end="url(#a4b)" stroke-dasharray="4,2"/>
  <line x1="212" y1="225" x2="318" y2="190" stroke="#4a90d9" stroke-width="1.4" marker-end="url(#a4b)" stroke-dasharray="4,2"/>
  <line x1="212" y1="225" x2="318" y2="230" stroke="#4a90d9" stroke-width="1.4" marker-end="url(#a4b)" stroke-dasharray="4,2"/>
  <line x1="212" y1="225" x2="318" y2="270" stroke="#4a90d9" stroke-width="1.4" marker-end="url(#a4b)" stroke-dasharray="4,2"/>
  <line x1="212" y1="225" x2="318" y2="310" stroke="#4a90d9" stroke-width="1.4" marker-end="url(#a4b)" stroke-dasharray="4,2"/>

  <!-- ── Right: Draft Model ── -->
  <text x="480" y="46" text-anchor="middle" fill="#333" font-weight="bold" font-size="12">Draft Model（5 层）</text>

  <!-- Input -->
  <rect x="322" y="56" width="316" height="26" fill="#e8f4fd" stroke="#4a90d9" rx="4"/>
  <text x="480" y="73" text-anchor="middle" fill="#145">Input: [M][M]…[M]  (γ tokens)</text>
  <line x1="480" y1="82" x2="480" y2="92" stroke="#4a90d9" stroke-width="1" marker-end="url(#a4b)"/>

  <!-- Layer 1 -->
  <rect x="322" y="96" width="316" height="26" fill="#d8eafd" stroke="#4a90d9" rx="4"/>
  <text x="480" y="113" text-anchor="middle" fill="#145">Draft Layer 1  [+g in KV]</text>
  <line x1="480" y1="122" x2="480" y2="132" stroke="#4a90d9" stroke-width="1" marker-end="url(#a4b)"/>

  <!-- Layer 2 -->
  <rect x="322" y="136" width="316" height="26" fill="#d8eafd" stroke="#4a90d9" rx="4"/>
  <text x="480" y="153" text-anchor="middle" fill="#145">Draft Layer 2  [+g in KV]</text>
  <line x1="480" y1="162" x2="480" y2="172" stroke="#4a90d9" stroke-width="1" marker-end="url(#a4b)"/>

  <!-- Layer 3 -->
  <rect x="322" y="176" width="316" height="26" fill="#d8eafd" stroke="#4a90d9" rx="4"/>
  <text x="480" y="193" text-anchor="middle" fill="#145">Draft Layer 3  [+g in KV]</text>
  <line x1="480" y1="202" x2="480" y2="212" stroke="#4a90d9" stroke-width="1" marker-end="url(#a4b)"/>

  <!-- Layer 4 -->
  <rect x="322" y="216" width="316" height="26" fill="#d8eafd" stroke="#4a90d9" rx="4"/>
  <text x="480" y="233" text-anchor="middle" fill="#145">Draft Layer 4  [+g in KV]</text>
  <line x1="480" y1="242" x2="480" y2="252" stroke="#4a90d9" stroke-width="1" marker-end="url(#a4b)"/>

  <!-- Layer 5 -->
  <rect x="322" y="256" width="316" height="26" fill="#d8eafd" stroke="#4a90d9" rx="4"/>
  <text x="480" y="273" text-anchor="middle" fill="#145">Draft Layer 5  [+g in KV]</text>

  <!-- Output -->
  <line x1="480" y1="282" x2="480" y2="295" stroke="#4a90d9" stroke-width="1" marker-end="url(#a4b)"/>
  <text x="480" y="314" text-anchor="middle" fill="#4a90d9" font-size="11">→  γ 个 Draft Tokens（并行输出）</text>
</svg>

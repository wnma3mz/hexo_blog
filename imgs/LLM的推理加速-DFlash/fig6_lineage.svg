<svg width="580" height="160" viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg">
  <style>text { font-family: monospace; font-size: 11px; }</style>
  <defs>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>
  <rect width="580" height="160" fill="#f9f9f9" rx="8"/>
  <text x="290" y="20" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">DFlash 的技术演进脉络</text>
  <!-- Node 1: Speculative Decoding -->
  <rect x="10" y="40" width="100" height="45" fill="#d8f0d8" stroke="#5a5" rx="5"/>
  <text x="60" y="58" text-anchor="middle" fill="#232" font-weight="bold">投机解码</text>
  <text x="60" y="72" text-anchor="middle" fill="#555">Leviathan'23</text>
  <text x="60" y="84" text-anchor="middle" fill="#555">AR草稿+验证</text>
  <!-- Arrow -->
  <line x1="112" y1="62" x2="130" y2="62" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>
  <!-- Node 2: EAGLE series -->
  <rect x="132" y="40" width="95" height="45" fill="#d8eafd" stroke="#4a90d9" rx="5"/>
  <text x="179" y="58" text-anchor="middle" fill="#145" font-weight="bold">EAGLE 系列</text>
  <text x="179" y="72" text-anchor="middle" fill="#555">Li'24/'25</text>
  <text x="179" y="84" text-anchor="middle" fill="#555">特征+AR草稿</text>
  <!-- Arrow to DFlash -->
  <line x1="229" y1="62" x2="248" y2="62" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>
  <!-- Node 3: LLaDA -->
  <rect x="10" y="108" width="95" height="40" fill="#fff3d8" stroke="#f0a500" rx="5"/>
  <text x="57" y="124" text-anchor="middle" fill="#600" font-weight="bold">LLaDA</text>
  <text x="57" y="138" text-anchor="middle" fill="#555">扩散语言模型</text>
  <!-- Arrow up-right -->
  <line x1="105" y1="118" x2="248" y2="80" stroke="#f0a500" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#a5)"/>
  <!-- Node 4: Block Diffusion -->
  <rect x="140" y="108" width="100" height="40" fill="#fff3d8" stroke="#f0a500" rx="5"/>
  <text x="190" y="124" text-anchor="middle" fill="#600" font-weight="bold">Block Diffusion</text>
  <text x="190" y="138" text-anchor="middle" fill="#555">块内并行生成</text>
  <!-- Arrow up-right -->
  <line x1="240" y1="118" x2="255" y2="80" stroke="#f0a500" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#a5)"/>
  <!-- Node 5: DFlash -->
  <rect x="253" y="35" width="130" height="55" fill="#fde8fd" stroke="#a04a90" rx="5"/>
  <text x="318" y="55" text-anchor="middle" fill="#503" font-weight="bold">DFlash</text>
  <text x="318" y="70" text-anchor="middle" fill="#555">块扩散草稿器</text>
  <text x="318" y="82" text-anchor="middle" fill="#555">+Target特征注入</text>
  <!-- Arrow -->
  <line x1="385" y1="62" x2="404" y2="62" stroke="#555" stroke-width="1.5" marker-end="url(#a5)"/>
  <!-- Node 6: Result -->
  <rect x="408" y="40" width="155" height="45" fill="#d5f5d5" stroke="#3a3" rx="5"/>
  <text x="485" y="58" text-anchor="middle" fill="#131" font-weight="bold">6x+ 无损加速</text>
  <text x="485" y="72" text-anchor="middle" fill="#333">AAL 6.49 tokens</text>
  <text x="485" y="84" text-anchor="middle" fill="#333">vs. AR baseline</text>

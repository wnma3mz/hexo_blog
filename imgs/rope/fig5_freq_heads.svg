      <rect x="80" y="80" width="18" height="18" fill="#4361ee" opacity="0.90"/>
      <rect x="100" y="80" width="18" height="18" fill="#4361ee" opacity="0.07"/>
      <rect x="120" y="80" width="18" height="18" fill="#4361ee" opacity="0.02"/>
      <rect x="140" y="80" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <!-- Row 6 -->
      <rect x="0" y="100" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="20" y="100" width="18" height="18" fill="#4361ee" opacity="0.02"/>
      <rect x="40" y="100" width="18" height="18" fill="#4361ee" opacity="0.03"/>

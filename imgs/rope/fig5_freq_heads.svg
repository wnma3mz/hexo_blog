      <rect x="20" y="0" width="18" height="18" fill="#4361ee" opacity="0.05"/>
      <rect x="40" y="0" width="18" height="18" fill="#4361ee" opacity="0.02"/>
      <rect x="60" y="0" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="80" y="0" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="100" y="0" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="120" y="0" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="140" y="0" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <!-- Row 2 -->
      <rect x="0" y="20" width="18" height="18" fill="#4361ee" opacity="0.3"/>
      <rect x="20" y="20" width="18" height="18" fill="#4361ee" opacity="0.9"/>
      <rect x="40" y="20" width="18" height="18" fill="#4361ee" opacity="0.05"/>
      <rect x="60" y="20" width="18" height="18" fill="#4361ee" opacity="0.02"/>
      <rect x="80" y="20" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="100" y="20" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="120" y="20" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="140" y="20" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <!-- Row 3 -->
      <rect x="0" y="40" width="18" height="18" fill="#4361ee" opacity="0.05"/>
      <rect x="20" y="40" width="18" height="18" fill="#4361ee" opacity="0.35"/>
      <rect x="40" y="40" width="18" height="18" fill="#4361ee" opacity="0.85"/>
      <rect x="60" y="40" width="18" height="18" fill="#4361ee" opacity="0.08"/>
      <rect x="80" y="40" width="18" height="18" fill="#4361ee" opacity="0.02"/>
      <rect x="100" y="40" width="18" height="18" fill="#4361ee" opacity="0.01"/>
      <rect x="120" y="40" width="18" height="18" fill="#4361ee" opacity="0.01"/>

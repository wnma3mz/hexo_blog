      <rect x="140" y="20" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <!-- Row 3 -->
      <rect x="0" y="40" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="20" y="40" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <rect x="40" y="40" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="60" y="40" width="18" height="18" fill="#f72585" opacity="0.11"/>
      <rect x="80" y="40" width="18" height="18" fill="#f72585" opacity="0.90"/>
      <rect x="100" y="40" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="120" y="40" width="18" height="18" fill="#f72585" opacity="0.06"/>
      <rect x="140" y="40" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <!-- Row 4 -->
      <rect x="0" y="60" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <rect x="20" y="60" width="18" height="18" fill="#f72585" opacity="0.91"/>
      <rect x="40" y="60" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="60" y="60" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="80" y="60" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <rect x="100" y="60" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <rect x="120" y="60" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="140" y="60" width="18" height="18" fill="#f72585" opacity="0.06"/>
      <!-- Row 5 -->
      <rect x="0" y="80" width="18" height="18" fill="#f72585" opacity="0.06"/>
      <rect x="20" y="80" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="40" y="80" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <rect x="60" y="80" width="18" height="18" fill="#f72585" opacity="0.87"/>
      <rect x="80" y="80" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="100" y="80" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="120" y="80" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <rect x="140" y="80" width="18" height="18" fill="#f72585" opacity="0.11"/>
      <!-- Row 6 -->
      <rect x="0" y="100" width="18" height="18" fill="#f72585" opacity="0.11"/>
      <rect x="20" y="100" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="40" y="100" width="18" height="18" fill="#f72585" opacity="0.06"/>
      <rect x="60" y="100" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="80" y="100" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <rect x="100" y="100" width="18" height="18" fill="#f72585" opacity="0.89"/>
      <rect x="120" y="100" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="140" y="100" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <!-- Row 7 -->
      <rect x="0" y="120" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="20" y="120" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <rect x="40" y="120" width="18" height="18" fill="#f72585" opacity="0.88"/>
      <rect x="60" y="120" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="80" y="120" width="18" height="18" fill="#f72585" opacity="0.06"/>
      <rect x="100" y="120" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <rect x="120" y="120" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <rect x="140" y="120" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <!-- Row 8 -->

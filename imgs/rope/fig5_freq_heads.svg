<svg width="720" height="380" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <rect width="720" height="380" fill="#fafafa" rx="12"/>
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">RoPE 的频率分工：位置头用高频，语义头用低频</text>

  <!-- Left: Positional Head attention map -->
  <g transform="translate(40, 50)">
    <text x="140" y="18" text-anchor="middle" font-size="13" fill="#4361ee" font-weight="bold">位置头（Positional Head）</text>
    <text x="140" y="35" text-anchor="middle" font-size="11" fill="#888">注意力集中在对角线——只看邻近 token</text>

    <!-- 12x12 attention heatmap, diagonal pattern -->
    <!-- cell size ~20px, start x=40, y=50 -->
    <g transform="translate(40, 45)">
      <!-- Row/col labels -->
      <text x="-5" y="15" text-anchor="end" font-size="9" fill="#aaa">1</text>
      <text x="-5" y="35" text-anchor="end" font-size="9" fill="#aaa">2</text>
      <text x="-5" y="55" text-anchor="end" font-size="9" fill="#aaa">3</text>
      <text x="-5" y="75" text-anchor="end" font-size="9" fill="#aaa">4</text>
      <text x="-5" y="95" text-anchor="end" font-size="9" fill="#aaa">5</text>
      <text x="-5" y="115" text-anchor="end" font-size="9" fill="#aaa">6</text>
      <text x="-5" y="135" text-anchor="end" font-size="9" fill="#aaa">7</text>
      <text x="-5" y="155" text-anchor="end" font-size="9" fill="#aaa">8</text>
      <!-- Diagonal dominance: high values near diagonal -->

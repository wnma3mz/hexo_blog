      <!-- Row 4 -->
      <rect x="0" y="60" width="18" height="18" fill="#4361ee" opacity="0.03"/>
      <rect x="20" y="60" width="18" height="18" fill="#4361ee" opacity="0.07"/>
      <rect x="40" y="60" width="18" height="18" fill="#4361ee" opacity="0.32"/>
      <rect x="60" y="60" width="18" height="18" fill="#4361ee" opacity="0.88"/>
      <rect x="80" y="60" width="18" height="18" fill="#4361ee" opacity="0.06"/>
      <rect x="100" y="60" width="18" height="18" fill="#4361ee" opacity="0.02"/>

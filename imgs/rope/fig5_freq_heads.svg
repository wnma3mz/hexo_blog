  </g>

  <!-- Bottom explanation -->
  <rect x="40" y="312" width="640" height="52" rx="8" fill="#fff8f0" stroke="#f4a261" stroke-width="1"/>
  <text x="360" y="334" text-anchor="middle" font-size="12" fill="#8a4a00" font-weight="bold">RoPE-scaling 的困境</text>
  <text x="360" y="352" text-anchor="middle" font-size="11.5" fill="#8a6030">扩展 context 必须压缩低频 → 语义头的坐标系被改变 → 超长距离的信息检索失败</text>

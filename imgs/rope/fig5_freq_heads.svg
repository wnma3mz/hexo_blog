    <text x="140" y="225" text-anchor="middle" font-size="11" fill="#4361ee">主要使用高频维度</text>
    <text x="140" y="240" text-anchor="middle" font-size="10.5" fill="#888">高频旋转快 → 相邻 token 角度差大 → 易区分</text>
  </g>

  <!-- Right: Semantic Head attention map -->
  <g transform="translate(390, 50)">
    <text x="140" y="18" text-anchor="middle" font-size="13" fill="#f72585" font-weight="bold">语义头（Semantic Head）</text>
    <text x="140" y="35" text-anchor="middle" font-size="11" fill="#888">注意力分散——按内容远程检索</text>

    <g transform="translate(40, 45)">
      <!-- Scattered attention pattern -->
      <!-- Row 1: attending to position 6 strongly -->
      <rect x="0" y="0" width="18" height="18" fill="#f72585" opacity="0.08"/>
      <rect x="20" y="0" width="18" height="18" fill="#f72585" opacity="0.12"/>
      <rect x="40" y="0" width="18" height="18" fill="#f72585" opacity="0.06"/>
      <rect x="60" y="0" width="18" height="18" fill="#f72585" opacity="0.09"/>
      <rect x="80" y="0" width="18" height="18" fill="#f72585" opacity="0.11"/>
      <rect x="100" y="0" width="18" height="18" fill="#f72585" opacity="0.88"/>
      <rect x="120" y="0" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <rect x="140" y="0" width="18" height="18" fill="#f72585" opacity="0.07"/>
      <!-- Row 2 -->
      <rect x="0" y="20" width="18" height="18" fill="#f72585" opacity="0.10"/>
      <rect x="20" y="20" width="18" height="18" fill="#f72585" opacity="0.07"/>

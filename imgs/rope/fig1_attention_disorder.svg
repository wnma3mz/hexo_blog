<svg width="720" height="320" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="320" fill="#fafafa" rx="12"/>
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Attention 是集合操作：词序打乱后，注意力矩阵不变</text>

  <!-- Left: original sentence -->
  <g transform="translate(30, 55)">
    <text x="130" y="18" text-anchor="middle" font-size="13" fill="#555">原始顺序</text>
    <!-- Tokens -->
    <rect x="10" y="28" width="60" height="32" rx="6" fill="#4361ee"/>
    <text x="40" y="49" text-anchor="middle" font-size="13" fill="white" font-weight="bold">I</text>
    <rect x="80" y="28" width="60" height="32" rx="6" fill="#3a0ca3"/>
    <text x="110" y="49" text-anchor="middle" font-size="13" fill="white" font-weight="bold">love</text>
    <rect x="150" y="28" width="60" height="32" rx="6" fill="#7209b7"/>
    <text x="180" y="49" text-anchor="middle" font-size="13" fill="white" font-weight="bold">you</text>

    <!-- Attention matrix -->
    <text x="130" y="100" text-anchor="middle" font-size="11" fill="#888">注意力矩阵</text>
    <!-- Row/Col labels -->
    <text x="78" y="125" text-anchor="middle" font-size="10" fill="#4361ee">I</text>
    <text x="111" y="125" text-anchor="middle" font-size="10" fill="#3a0ca3">love</text>
    <text x="145" y="125" text-anchor="middle" font-size="10" fill="#7209b7">you</text>
    <text x="55" y="145" text-anchor="end" font-size="10" fill="#4361ee">I</text>
    <text x="55" y="175" text-anchor="end" font-size="10" fill="#3a0ca3">love</text>
    <text x="55" y="205" text-anchor="end" font-size="10" fill="#7209b7">you</text>
    <!-- Matrix cells -->
    <rect x="60" y="130" width="32" height="32" rx="3" fill="#4361ee" opacity="0.9"/>
    <text x="76" y="151" text-anchor="middle" font-size="10" fill="white">0.6</text>
    <rect x="95" y="130" width="32" height="32" rx="3" fill="#4361ee" opacity="0.4"/>
    <text x="111" y="151" text-anchor="middle" font-size="10" fill="#333">0.3</text>
    <rect x="130" y="130" width="32" height="32" rx="3" fill="#4361ee" opacity="0.15"/>
    <text x="146" y="151" text-anchor="middle" font-size="10" fill="#333">0.1</text>

    <rect x="60" y="162" width="32" height="32" rx="3" fill="#3a0ca3" opacity="0.3"/>
    <text x="76" y="183" text-anchor="middle" font-size="10" fill="#333">0.2</text>
    <rect x="95" y="162" width="32" height="32" rx="3" fill="#3a0ca3" opacity="0.8"/>
    <text x="111" y="183" text-anchor="middle" font-size="10" fill="white">0.5</text>
    <rect x="130" y="162" width="32" height="32" rx="3" fill="#3a0ca3" opacity="0.5"/>
    <text x="146" y="183" text-anchor="middle" font-size="10" fill="white">0.3</text>

    <rect x="60" y="194" width="32" height="32" rx="3" fill="#7209b7" opacity="0.2"/>
    <text x="76" y="215" text-anchor="middle" font-size="10" fill="#333">0.1</text>
    <rect x="95" y="194" width="32" height="32" rx="3" fill="#7209b7" opacity="0.5"/>
    <text x="111" y="215" text-anchor="middle" font-size="10" fill="white">0.3</text>
    <rect x="130" y="194" width="32" height="32" rx="3" fill="#7209b7" opacity="0.9"/>
    <text x="146" y="215" text-anchor="middle" font-size="10" fill="white">0.6</text>
  </g>

  <!-- Arrow + label -->
  <text x="330" y="175" text-anchor="middle" font-size="26" fill="#e63946">≡</text>
  <text x="330" y="200" text-anchor="middle" font-size="11" fill="#e63946">注意力矩阵</text>
  <text x="330" y="215" text-anchor="middle" font-size="11" fill="#e63946">完全相同</text>

  <!-- Right: shuffled sentence -->
  <g transform="translate(360, 55)">
    <text x="130" y="18" text-anchor="middle" font-size="13" fill="#555">词序打乱</text>
    <!-- Tokens (shuffled) -->
    <rect x="10" y="28" width="60" height="32" rx="6" fill="#7209b7"/>
    <text x="40" y="49" text-anchor="middle" font-size="13" fill="white" font-weight="bold">you</text>
    <rect x="80" y="28" width="60" height="32" rx="6" fill="#3a0ca3"/>
    <text x="110" y="49" text-anchor="middle" font-size="13" fill="white" font-weight="bold">love</text>
    <rect x="150" y="28" width="60" height="32" rx="6" fill="#4361ee"/>
    <text x="180" y="49" text-anchor="middle" font-size="13" fill="white" font-weight="bold">I</text>

    <!-- Attention matrix (same values) -->
    <text x="130" y="100" text-anchor="middle" font-size="11" fill="#888">注意力矩阵</text>
    <text x="78" y="125" text-anchor="middle" font-size="10" fill="#7209b7">you</text>
    <text x="111" y="125" text-anchor="middle" font-size="10" fill="#3a0ca3">love</text>
    <text x="145" y="125" text-anchor="middle" font-size="10" fill="#4361ee">I</text>
    <text x="55" y="145" text-anchor="end" font-size="10" fill="#7209b7">you</text>
    <text x="55" y="175" text-anchor="end" font-size="10" fill="#3a0ca3">love</text>
    <text x="55" y="205" text-anchor="end" font-size="10" fill="#4361ee">I</text>

    <rect x="60" y="130" width="32" height="32" rx="3" fill="#7209b7" opacity="0.9"/>
    <text x="76" y="151" text-anchor="middle" font-size="10" fill="white">0.6</text>
    <rect x="95" y="130" width="32" height="32" rx="3" fill="#7209b7" opacity="0.4"/>
    <text x="111" y="151" text-anchor="middle" font-size="10" fill="#333">0.3</text>
    <rect x="130" y="130" width="32" height="32" rx="3" fill="#7209b7" opacity="0.15"/>
    <text x="146" y="151" text-anchor="middle" font-size="10" fill="#333">0.1</text>

    <rect x="60" y="162" width="32" height="32" rx="3" fill="#3a0ca3" opacity="0.3"/>
    <text x="76" y="183" text-anchor="middle" font-size="10" fill="#333">0.2</text>
    <rect x="95" y="162" width="32" height="32" rx="3" fill="#3a0ca3" opacity="0.8"/>
    <text x="111" y="183" text-anchor="middle" font-size="10" fill="white">0.5</text>
    <rect x="130" y="162" width="32" height="32" rx="3" fill="#3a0ca3" opacity="0.5"/>
    <text x="146" y="183" text-anchor="middle" font-size="10" fill="white">0.3</text>

    <rect x="60" y="194" width="32" height="32" rx="3" fill="#4361ee" opacity="0.2"/>
    <text x="76" y="215" text-anchor="middle" font-size="10" fill="#333">0.1</text>
    <rect x="95" y="194" width="32" height="32" rx="3" fill="#4361ee" opacity="0.5"/>
    <text x="111" y="215" text-anchor="middle" font-size="10" fill="white">0.3</text>
    <rect x="130" y="194" width="32" height="32" rx="3" fill="#4361ee" opacity="0.9"/>
    <text x="146" y="215" text-anchor="middle" font-size="10" fill="white">0.6</text>
  </g>

  <!-- Bottom note -->
  <text x="360" y="295" text-anchor="middle" font-size="12" fill="#888">若无位置编码，Attention 无法区分这两个序列——它们的输出完全相同</text>
</svg>

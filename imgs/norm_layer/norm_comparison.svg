<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="serif">
  <rect width="900" height="420" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">四种归一化方法：统计量来自哪些元素？</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#888">深色格子 = 参与计算均值和方差的元素（同色格子共享一组统计量）</text>

  <!-- ===== 共用图例说明 ===== -->
  <!-- N轴说明放在最左 -->
  <text x="18" y="240" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,18,240)">batch (N)</text>
  <text x="460" y="410" text-anchor="middle" font-size="11" fill="#555">channel (C) →</text>

  <!-- ===== BN ===== -->
  <text x="112" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a90d9">Batch Norm</text>
  <text x="112" y="86" text-anchor="middle" font-size="10" fill="#888">跨 N，每个 C 独立</text>

  <g transform="translate(52, 100)">
    <!-- 4×4 grid, highlight column 1 (C1) -->
    <!-- row 0 -->
    <rect x="0"  y="0"  width="28" height="28" rx="2" fill="#4a90d9" stroke="#2c6fad" opacity="0.85"/>
    <rect x="32" y="0"  width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="64" y="0"  width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="96" y="0"  width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <!-- row 1 -->
    <rect x="0"  y="32" width="28" height="28" rx="2" fill="#4a90d9" stroke="#2c6fad" opacity="0.85"/>
    <rect x="32" y="32" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="64" y="32" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="96" y="32" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <!-- row 2 -->
    <rect x="0"  y="64" width="28" height="28" rx="2" fill="#4a90d9" stroke="#2c6fad" opacity="0.85"/>
    <rect x="32" y="64" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="64" y="64" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="96" y="64" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <!-- row 3 -->
    <rect x="0"  y="96" width="28" height="28" rx="2" fill="#4a90d9" stroke="#2c6fad" opacity="0.85"/>
    <rect x="32" y="96" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="64" y="96" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <rect x="96" y="96" width="28" height="28" rx="2" fill="#dce8f5" stroke="#b0c8e8"/>
    <!-- axis ticks -->
    <text x="-6"  y="18"  text-anchor="end" font-size="9" fill="#aaa">n1</text>
    <text x="-6"  y="50"  text-anchor="end" font-size="9" fill="#aaa">n2</text>
    <text x="-6"  y="82"  text-anchor="end" font-size="9" fill="#aaa">n3</text>
    <text x="-6"  y="114" text-anchor="end" font-size="9" fill="#aaa">n4</text>
    <text x="14"  y="-4" text-anchor="middle" font-size="9" fill="#4a90d9" font-weight="bold">c1</text>
    <text x="46"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c2</text>
    <text x="78"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c3</text>
    <text x="110" y="-4" text-anchor="middle" font-size="9" fill="#aaa">c4</text>
  </g>
  <text x="112" y="270" text-anchor="middle" font-size="10" fill="#4a90d9">同一 channel，所有样本</text>
  <text x="112" y="283" text-anchor="middle" font-size="10" fill="#4a90d9">共享一组 (μ, σ)</text>

  <!-- ===== LN ===== -->
  <text x="337" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">Layer Norm</text>
  <text x="337" y="86" text-anchor="middle" font-size="10" fill="#888">跨 C，每个 N 独立</text>

  <g transform="translate(277, 100)">
    <!-- highlight row 0 (n1) -->
    <rect x="0"  y="0"  width="28" height="28" rx="2" fill="#27ae60" stroke="#1e8449" opacity="0.85"/>
    <rect x="32" y="0"  width="28" height="28" rx="2" fill="#27ae60" stroke="#1e8449" opacity="0.85"/>
    <rect x="64" y="0"  width="28" height="28" rx="2" fill="#27ae60" stroke="#1e8449" opacity="0.85"/>
    <rect x="96" y="0"  width="28" height="28" rx="2" fill="#27ae60" stroke="#1e8449" opacity="0.85"/>
    <!-- rows 1-3 -->
    <rect x="0"  y="32" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="32" y="32" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="64" y="32" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="96" y="32" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="0"  y="64" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="32" y="64" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="64" y="64" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="96" y="64" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="0"  y="96" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="32" y="96" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="64" y="96" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <rect x="96" y="96" width="28" height="28" rx="2" fill="#c8e6c9" stroke="#a5d6a7"/>
    <!-- ticks -->
    <text x="-6"  y="18"  text-anchor="end" font-size="9" fill="#27ae60" font-weight="bold">n1</text>
    <text x="-6"  y="50"  text-anchor="end" font-size="9" fill="#aaa">n2</text>
    <text x="-6"  y="82"  text-anchor="end" font-size="9" fill="#aaa">n3</text>
    <text x="-6"  y="114" text-anchor="end" font-size="9" fill="#aaa">n4</text>
    <text x="14"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c1</text>
    <text x="46"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c2</text>
    <text x="78"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c3</text>
    <text x="110" y="-4" text-anchor="middle" font-size="9" fill="#aaa">c4</text>
  </g>
  <text x="337" y="270" text-anchor="middle" font-size="10" fill="#27ae60">同一样本，所有 channel</text>
  <text x="337" y="283" text-anchor="middle" font-size="10" fill="#27ae60">共享一组 (μ, σ)</text>

  <!-- ===== IN ===== -->
  <text x="562" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#e07b3a">Instance Norm</text>
  <text x="562" y="86" text-anchor="middle" font-size="10" fill="#888">每个 N×C 独立</text>

  <g transform="translate(502, 100)">
    <!-- each cell is its own group: highlight (n1, c1) = top-left cell only, others different shades -->
    <!-- row 0: all highlighted individually (different shades to show independence) -->
    <rect x="0"  y="0"  width="28" height="28" rx="2" fill="#e07b3a" stroke="#b85a20" opacity="0.9"/>
    <rect x="32" y="0"  width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="64" y="0"  width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="96" y="0"  width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <!-- row 1 -->
    <rect x="0"  y="32" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="32" y="32" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="64" y="32" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="96" y="32" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <!-- row 2 -->
    <rect x="0"  y="64" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="32" y="64" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="64" y="64" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="96" y="64" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <!-- row 3 -->
    <rect x="0"  y="96" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="32" y="96" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="64" y="96" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <rect x="96" y="96" width="28" height="28" rx="2" fill="#f0b482" stroke="#d4956a"/>
    <!-- ticks -->
    <text x="-6"  y="18"  text-anchor="end" font-size="9" fill="#aaa">n1</text>
    <text x="-6"  y="50"  text-anchor="end" font-size="9" fill="#aaa">n2</text>
    <text x="-6"  y="82"  text-anchor="end" font-size="9" fill="#aaa">n3</text>
    <text x="-6"  y="114" text-anchor="end" font-size="9" fill="#aaa">n4</text>
    <text x="14"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c1</text>
    <text x="46"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c2</text>
    <text x="78"  y="-4" text-anchor="middle" font-size="9" fill="#aaa">c3</text>
    <text x="110" y="-4" text-anchor="middle" font-size="9" fill="#aaa">c4</text>
  </g>
  <text x="562" y="270" text-anchor="middle" font-size="10" fill="#e07b3a">每个 (样本, channel) 对</text>
  <text x="562" y="283" text-anchor="middle" font-size="10" fill="#e07b3a">单独一组 (μ, σ)（用于风格化）</text>

  <!-- ===== GN ===== -->
  <text x="778" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#8e44ad">Group Norm</text>
  <text x="778" y="86" text-anchor="middle" font-size="10" fill="#888">channel 分组，每个 N 独立</text>

  <g transform="translate(716, 108)">
    <!-- 4 channels split into 2 groups: c1+c2 = group1 (purple), c3+c4 = group2 (lighter purple) -->
    <!-- row 0, group1 highlighted -->
    <rect x="0"  y="0"  width="28" height="28" rx="2" fill="#8e44ad" stroke="#6c3483" opacity="0.85"/>
    <rect x="32" y="0"  width="28" height="28" rx="2" fill="#8e44ad" stroke="#6c3483" opacity="0.85"/>
    <rect x="64" y="0"  width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <rect x="96" y="0"  width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <!-- row 1 -->
    <rect x="0"  y="32" width="28" height="28" rx="2" fill="#d2b4de" stroke="#bb8fce"/>
    <rect x="32" y="32" width="28" height="28" rx="2" fill="#d2b4de" stroke="#bb8fce"/>
    <rect x="64" y="32" width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <rect x="96" y="32" width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <!-- row 2 -->
    <rect x="0"  y="64" width="28" height="28" rx="2" fill="#d2b4de" stroke="#bb8fce"/>
    <rect x="32" y="64" width="28" height="28" rx="2" fill="#d2b4de" stroke="#bb8fce"/>
    <rect x="64" y="64" width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <rect x="96" y="64" width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <!-- row 3 -->
    <rect x="0"  y="96" width="28" height="28" rx="2" fill="#d2b4de" stroke="#bb8fce"/>
    <rect x="32" y="96" width="28" height="28" rx="2" fill="#d2b4de" stroke="#bb8fce"/>
    <rect x="64" y="96" width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <rect x="96" y="96" width="28" height="28" rx="2" fill="#d7bde2" stroke="#bb8fce"/>
    <!-- group boundary line -->
    <line x1="62" y1="-18" x2="62" y2="130" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- 组标签：在列标签上方一行，不重叠 -->
    <text x="29"  y="-18" text-anchor="middle" font-size="9" fill="#8e44ad">组1</text>
    <text x="93"  y="-18" text-anchor="middle" font-size="9" fill="#8e44ad">组2</text>
    <!-- 列标签 -->
    <text x="14"  y="-6" text-anchor="middle" font-size="9" fill="#aaa">c1</text>
    <text x="46"  y="-6" text-anchor="middle" font-size="9" fill="#aaa">c2</text>
    <text x="78"  y="-6" text-anchor="middle" font-size="9" fill="#aaa">c3</text>
    <text x="110" y="-6" text-anchor="middle" font-size="9" fill="#aaa">c4</text>
    <!-- 行标签 -->
    <text x="-6"  y="18"  text-anchor="end" font-size="9" fill="#8e44ad" font-weight="bold">n1</text>
    <text x="-6"  y="50"  text-anchor="end" font-size="9" fill="#aaa">n2</text>
    <text x="-6"  y="82"  text-anchor="end" font-size="9" fill="#aaa">n3</text>
    <text x="-6"  y="114" text-anchor="end" font-size="9" fill="#aaa">n4</text>
  </g>
  <text x="778" y="270" text-anchor="middle" font-size="10" fill="#8e44ad">同一样本，同组 channel 内</text>
  <text x="778" y="283" text-anchor="middle" font-size="10" fill="#8e44ad">共享一组 (μ, σ)</text>

  <!-- 竖分隔线 -->
  <line x1="225" y1="60" x2="225" y2="300" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="450" y1="60" x2="450" y2="300" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="675" y1="60" x2="675" y2="300" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- 底部对比总结 -->
  <rect x="50" y="308" width="800" height="68" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="326" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">关键区别</text>
  <text x="112" y="344" text-anchor="middle" font-size="10" fill="#4a90d9">BN：依赖 batch 大小</text>
  <text x="112" y="358" text-anchor="middle" font-size="10" fill="#4a90d9">batch 小则统计量不稳定</text>
  <text x="337" y="344" text-anchor="middle" font-size="10" fill="#27ae60">LN：batch 无关</text>
  <text x="337" y="358" text-anchor="middle" font-size="10" fill="#27ae60">适合 Transformer/RNN</text>
  <text x="562" y="344" text-anchor="middle" font-size="10" fill="#e07b3a">IN：batch + channel 均无关</text>
  <text x="562" y="358" text-anchor="middle" font-size="10" fill="#e07b3a">用于图像风格迁移</text>
  <text x="778" y="344" text-anchor="middle" font-size="10" fill="#8e44ad">GN：batch 无关</text>
  <text x="778" y="358" text-anchor="middle" font-size="10" fill="#8e44ad">小 batch 视觉任务的替代</text>
</svg>

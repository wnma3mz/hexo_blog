<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 420" font-family="serif">
  <rect width="840" height="420" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="420" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">SGD 的困境：同一学习率无法适应不同参数</text>

  <!-- ========== 左图：参数 A（梯度大）========== -->
  <text x="210" y="60" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">参数 A（梯度大，如常见词 embedding）</text>

  <!-- 坐标轴 -->
  <line x1="55" y1="330" x2="370" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="55" y1="330" x2="55" y2="90" stroke="#aaa" stroke-width="1.5"/>
  <text x="378" y="334" font-size="12" fill="#aaa">step</text>
  <text x="42" y="88" font-size="12" fill="#aaa">θ</text>

  <!-- 最优值虚线 -->
  <line x1="55" y1="210" x2="370" y2="210" stroke="#e05252" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="310" y="205" font-size="11" fill="#e05252">最优值</text>

  <!-- SGD 轨迹（震荡） -->
  <polyline points="75,300 115,140 155,280 195,155 235,270 275,160 315,260"
            fill="none" stroke="#e07b3a" stroke-width="2"/>

  <!-- 起点 -->
  <circle cx="75" cy="300" r="4" fill="#e07b3a"/>
  <text x="80" y="315" font-size="11" fill="#e07b3a">start</text>

  <!-- 说明文字 -->
  <text x="210" y="365" text-anchor="middle" font-size="12" fill="#e07b3a">步子太大，在最优值附近来回震荡</text>

  <!-- ========== 右图：参数 B（梯度小）========== -->
  <text x="640" y="60" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">参数 B（梯度小，如罕见词 embedding）</text>

  <!-- 坐标轴 -->
  <line x1="480" y1="330" x2="795" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="480" y1="330" x2="480" y2="90" stroke="#aaa" stroke-width="1.5"/>
  <text x="803" y="334" font-size="12" fill="#aaa">step</text>
  <text x="467" y="88" font-size="12" fill="#aaa">θ</text>

  <!-- 最优值虚线 -->
  <line x1="480" y1="170" x2="795" y2="170" stroke="#e05252" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="735" y="165" font-size="11" fill="#e05252">最优值</text>

  <!-- SGD 轨迹（几乎不动） -->
  <polyline points="500,300 540,292 580,285 620,278 660,272 700,266 740,261"
            fill="none" stroke="#4a90d9" stroke-width="2"/>

  <!-- 起点 -->
  <circle cx="500" cy="300" r="4" fill="#4a90d9"/>
  <text x="505" y="315" font-size="11" fill="#4a90d9">start</text>

  <!-- 说明文字 -->
  <text x="640" y="365" text-anchor="middle" font-size="12" fill="#4a90d9">步子太小，几乎不动，远未收敛</text>

  <!-- 分隔线 -->
  <line x1="425" y1="45" x2="425" y2="345" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 底部总结 -->
  <text x="420" y="400" text-anchor="middle" font-size="12" fill="#888">同一个学习率 η：对参数 A 太大，对参数 B 太小——两头都不讨好</text>
</svg>

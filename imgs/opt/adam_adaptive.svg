<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 440" font-family="serif">
  <rect width="840" height="440" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="420" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Adam 的解法：√v_t 归一化后，两个参数都能稳定收敛</text>

  <!-- ========== 左图：参数 A ========== -->
  <text x="210" y="58" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">参数 A（梯度大）</text>
  <text x="210" y="76" text-anchor="middle" font-size="12" fill="#888">√v_t 大 → 实际步长被压小</text>

  <!-- 坐标轴 -->
  <line x1="55" y1="330" x2="370" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="55" y1="330" x2="55" y2="95" stroke="#aaa" stroke-width="1.5"/>
  <text x="378" y="334" font-size="12" fill="#aaa">step</text>
  <text x="42" y="93" font-size="12" fill="#aaa">θ</text>

  <!-- 最优值虚线 -->
  <line x1="55" y1="210" x2="370" y2="210" stroke="#e05252" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="310" y="205" font-size="11" fill="#e05252">最优值</text>

  <!-- Adam 轨迹（平稳收敛） -->
  <polyline points="75,300 115,265 155,240 195,223 235,214 275,211 315,210"
            fill="none" stroke="#27ae60" stroke-width="2.5"/>

  <!-- 起点终点 -->
  <circle cx="75" cy="300" r="4" fill="#27ae60"/>
  <text x="80" y="315" font-size="11" fill="#27ae60">start</text>
  <circle cx="315" cy="210" r="5" fill="#e05252"/>

  <!-- 步长对比示意 -->
  <line x1="115" y1="265" x2="115" y2="155" stroke="#e07b3a" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="120" y="215" font-size="10" fill="#e07b3a">原始梯度大</text>
  <line x1="155" y1="265" x2="155" y2="240" stroke="#27ae60" stroke-width="2"/>
  <text x="160" y="258" font-size="10" fill="#27ae60">实际步长小</text>

  <text x="210" y="365" text-anchor="middle" font-size="12" fill="#27ae60">步长自动压小，平稳收敛</text>

  <!-- ========== 右图：参数 B ========== -->
  <text x="640" y="58" text-anchor="middle" font-size="14" fill="#333" font-weight="bold">参数 B（梯度小）</text>
  <text x="640" y="76" text-anchor="middle" font-size="12" fill="#888">√v_t 小 → 实际步长被放大</text>

  <!-- 坐标轴 -->
  <line x1="480" y1="330" x2="795" y2="330" stroke="#aaa" stroke-width="1.5"/>
  <line x1="480" y1="330" x2="480" y2="95" stroke="#aaa" stroke-width="1.5"/>
  <text x="803" y="334" font-size="12" fill="#aaa">step</text>
  <text x="467" y="93" font-size="12" fill="#aaa">θ</text>

  <!-- 最优值虚线 -->
  <line x1="480" y1="170" x2="795" y2="170" stroke="#e05252" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="735" y="165" font-size="11" fill="#e05252">最优值</text>

  <!-- Adam 轨迹（步长被放大，顺利收敛） -->
  <polyline points="500,300 540,258 580,225 620,198 660,180 700,173 740,170"
            fill="none" stroke="#27ae60" stroke-width="2.5"/>

  <!-- 起点终点 -->
  <circle cx="500" cy="300" r="4" fill="#27ae60"/>
  <text x="505" y="315" font-size="11" fill="#27ae60">start</text>
  <circle cx="740" cy="170" r="5" fill="#e05252"/>

  <!-- 步长对比示意 -->
  <line x1="540" y1="300" x2="540" y2="293" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="545" y="308" font-size="10" fill="#4a90d9">原始梯度小</text>
  <line x1="580" y1="258" x2="580" y2="225" stroke="#27ae60" stroke-width="2"/>
  <text x="585" y="248" font-size="10" fill="#27ae60">实际步长大</text>

  <text x="640" y="365" text-anchor="middle" font-size="12" fill="#27ae60">步长自动放大，顺利收敛</text>

  <!-- 分隔线 -->
  <line x1="425" y1="45" x2="425" y2="345" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 底部公式说明框 -->
  <rect x="160" y="385" width="520" height="38" rx="5" fill="#f0f7f0" stroke="#27ae60" stroke-width="1"/>
  <text x="420" y="400" text-anchor="middle" font-size="12" fill="#444">实际步长 = η · m_t / (√v_t + ε)</text>
  <text x="420" y="416" text-anchor="middle" font-size="12" fill="#444">梯度大 → v_t 大 → 步长小 ；梯度小 → v_t 小 → 步长大</text>
</svg>

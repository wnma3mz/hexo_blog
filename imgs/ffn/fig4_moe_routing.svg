<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="760" height="400" fill="#fafafa" rx="12"/>
  <text x="380" y="34" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">MoE 稀疏路由：8 个专家，Top-2 选择</text>

  <!-- Input Token -->
  <rect x="300" y="55" width="160" height="40" rx="8" fill="#EBF5FB" stroke="#4A90D9" stroke-width="2"/>
  <text x="380" y="80" text-anchor="middle" font-size="14" fill="#1a5276">Token x</text>

  <!-- Arrow to gating -->
  <line x1="380" y1="95" x2="380" y2="130" stroke="#666" stroke-width="2" marker-end="url(#ma)"/>

  <!-- Gating Network -->
  <rect x="270" y="130" width="220" height="44" rx="8" fill="#FEF9E7" stroke="#E67E22" stroke-width="2"/>
  <text x="380" y="150" text-anchor="middle" font-size="13" fill="#7d4a00">门控网络 G(x)</text>
  <text x="380" y="167" text-anchor="middle" font-size="11" fill="#aaa">Softmax( x · W_g )</text>

  <!-- Scores display -->
  <rect x="500" y="130" width="220" height="44" rx="8" fill="#F9F9F9" stroke="#ccc" stroke-width="1.5"/>
  <text x="610" y="148" text-anchor="middle" font-size="12" fill="#555">得分 [0.31, 0.04, 0.22, 0.03,</text>
  <text x="610" y="164" text-anchor="middle" font-size="12" fill="#555"> 0.18, 0.02, 0.15, 0.05]</text>
  <line x1="490" y1="152" x2="500" y2="152" stroke="#ccc" stroke-width="1.5"/>

  <!-- Top-2 selection arrow -->
  <line x1="380" y1="174" x2="380" y2="210" stroke="#666" stroke-width="2" marker-end="url(#ma)"/>
  <text x="430" y="196" font-size="11" fill="#8E44AD">Top-2 选择</text>

  <!-- 8 Experts -->
  <!-- Expert 1: selected (score 0.31) -->
  <rect x="32" y="222" width="74" height="64" rx="8" fill="#E9F7EF" stroke="#27AE60" stroke-width="2.5"/>
  <text x="69" y="248" text-anchor="middle" font-size="12" fill="#1e8449">专家 1</text>
  <text x="69" y="263" text-anchor="middle" font-size="10" fill="#27AE60">SwiGLU</text>
  <text x="69" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#1e8449">0.31 ✓</text>

  <!-- Expert 2: not selected -->
  <rect x="116" y="222" width="74" height="64" rx="8" fill="#F5F5F5" stroke="#ccc" stroke-width="1.5"/>
  <text x="153" y="248" text-anchor="middle" font-size="12" fill="#aaa">专家 2</text>
  <text x="153" y="263" text-anchor="middle" font-size="10" fill="#ccc">SwiGLU</text>
  <text x="153" y="278" text-anchor="middle" font-size="12" fill="#bbb">0.04</text>

  <!-- Expert 3: selected (score 0.22) -->
  <rect x="200" y="222" width="74" height="64" rx="8" fill="#E9F7EF" stroke="#27AE60" stroke-width="2.5"/>
  <text x="237" y="248" text-anchor="middle" font-size="12" fill="#1e8449">专家 3</text>
  <text x="237" y="263" text-anchor="middle" font-size="10" fill="#27AE60">SwiGLU</text>
  <text x="237" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#1e8449">0.22 ✓</text>

  <!-- Expert 4: not selected -->
  <rect x="284" y="222" width="74" height="64" rx="8" fill="#F5F5F5" stroke="#ccc" stroke-width="1.5"/>
  <text x="321" y="248" text-anchor="middle" font-size="12" fill="#aaa">专家 4</text>
  <text x="321" y="263" text-anchor="middle" font-size="10" fill="#ccc">SwiGLU</text>
  <text x="321" y="278" text-anchor="middle" font-size="12" fill="#bbb">0.03</text>

  <!-- Expert 5: not selected -->
  <rect x="368" y="222" width="74" height="64" rx="8" fill="#F5F5F5" stroke="#ccc" stroke-width="1.5"/>
  <text x="405" y="248" text-anchor="middle" font-size="12" fill="#aaa">专家 5</text>
  <text x="405" y="263" text-anchor="middle" font-size="10" fill="#ccc">SwiGLU</text>
  <text x="405" y="278" text-anchor="middle" font-size="12" fill="#bbb">0.18</text>

  <!-- Expert 6: not selected -->
  <rect x="452" y="222" width="74" height="64" rx="8" fill="#F5F5F5" stroke="#ccc" stroke-width="1.5"/>
  <text x="489" y="248" text-anchor="middle" font-size="12" fill="#aaa">专家 6</text>
  <text x="489" y="263" text-anchor="middle" font-size="10" fill="#ccc">SwiGLU</text>
  <text x="489" y="278" text-anchor="middle" font-size="12" fill="#bbb">0.02</text>

  <!-- Expert 7: not selected -->
  <rect x="536" y="222" width="74" height="64" rx="8" fill="#F5F5F5" stroke="#ccc" stroke-width="1.5"/>
  <text x="573" y="248" text-anchor="middle" font-size="12" fill="#aaa">专家 7</text>
  <text x="573" y="263" text-anchor="middle" font-size="10" fill="#ccc">SwiGLU</text>
  <text x="573" y="278" text-anchor="middle" font-size="12" fill="#bbb">0.15</text>

  <!-- Expert 8: not selected -->
  <rect x="620" y="222" width="74" height="64" rx="8" fill="#F5F5F5" stroke="#ccc" stroke-width="1.5"/>
  <text x="657" y="248" text-anchor="middle" font-size="12" fill="#aaa">专家 8</text>
  <text x="657" y="263" text-anchor="middle" font-size="10" fill="#ccc">SwiGLU</text>
  <text x="657" y="278" text-anchor="middle" font-size="12" fill="#bbb">0.05</text>

  <!-- Routing lines from gating to experts 1 and 3 (selected) -->
  <line x1="340" y1="210" x2="90" y2="222" stroke="#27AE60" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#mag)"/>
  <line x1="420" y1="210" x2="250" y2="222" stroke="#27AE60" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#mag)"/>

  <!-- Weighted sum arrows -->
  <line x1="69" y1="286" x2="290" y2="326" stroke="#27AE60" stroke-width="2" marker-end="url(#mag)"/>
  <line x1="237" y1="286" x2="310" y2="326" stroke="#27AE60" stroke-width="2" marker-end="url(#mag)"/>

  <!-- Weighted sum box -->
  <rect x="260" y="326" width="240" height="42" rx="8" fill="#E8DAEF" stroke="#8E44AD" stroke-width="2"/>
  <text x="380" y="345" text-anchor="middle" font-size="13" fill="#6c3483">加权求和</text>
  <text x="380" y="361" text-anchor="middle" font-size="11" fill="#8E44AD">0.31·Expert₁(x) + 0.22·Expert₃(x)</text>

  <!-- Annotation: 只有 2/8 专家激活 -->
  <rect x="540" y="310" width="190" height="50" rx="8" fill="#FFF3CD" stroke="#F0AD4E" stroke-width="1.5"/>
  <text x="635" y="330" text-anchor="middle" font-size="12" fill="#856404">仅激活 2/8 专家</text>
  <text x="635" y="347" text-anchor="middle" font-size="11" fill="#a07000">FLOP 节省 75%</text>
  <line x1="536" y1="340" x2="500" y2="347" stroke="#F0AD4E" stroke-width="1.5"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="ma" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#666"/>
    </marker>
    <marker id="mag" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#27AE60"/>
    </marker>
  </defs>
</svg>
